DUT_product: "RXCC"
DUT_serial_number: "EV4"
foldername_comment: "first"
yaml_comment: "etc"
orientations: [ori1, ori2]  # [ori1, ori2, ori3, ori4]
orientation_description:  #see DAMspy-core\src\DAMspy_logs\rxcc orientations
  ori1: "Vert usb up to right hinge at front screen at back"
  ori2: "Flat pos2_usb to left hinge at front screen at back"
  ori3: "Vert usb down hinge at front screen at back"
  ori4: "Flat usb to right hinge at front screen at back"

axis: azimuth
boresight_deg: 0
max_angle_deg: 170
step_deg: 1
max_hold_seconds: 2
sweep_mode: boresight_return
live_plot_every_deg: 20
use_woym: true


height_m: 1.5
polarisation: [H, V]
dwell_s: 0
lowest_level: -80

sig_gen_1:  # rode rxcc device
  device_type: "rxcc"  # "rxcc", "hendrix_tx", or "hendrix_rx"
  channels: [0, 20]   # [0, 20, 40, 60, 80]
  power_levels: [10]
  antennas: ["main", "secondary"]

rx_path:
  antenna: "Horn WR340"   # receive antenna into spectrum analyser
  antenna_comment: "www.ainfoinc.com  2.2-3.3 GHz WR340 11dB  P/N NB-340-10-C-NF"
  rx_cable_loss_2.45Ghz: 4.6 #dB at 2.45GHz
  rx_dist_m: 3.02 # Distance in metres from centre of DAMS to Rx antenna

spec_an_1:  # signal hound BBD60
  span_hz: 100000
  rbw_hz: 10000
  vbw_hz: 10000
