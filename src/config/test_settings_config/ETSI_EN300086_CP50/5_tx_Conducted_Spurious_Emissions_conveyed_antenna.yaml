          LOW: 1e9
          HIGH: 3.6e9
        filter: 'TX_HPF_300MHz'
        resolution_bw: 1e6
        video_bw: 3e6
        rf_level_offset: 0.1 #dBm - NOTE: THIS WILL PROBABLY END UP BEING DYNAMIC...
        sweep_points: 20001
        transducer:
        - name: 'ETS_TX_LOSS_NOFILTER'
          state: 'OFF'
        - name: 'ETS_TX_LOSS_700FILTER'
          state: 'OFF'
